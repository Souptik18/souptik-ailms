[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin"]

[[redirects]]
  from = "/api/session/login"
  to = "/.netlify/functions/session-login"
  status = 200

[[redirects]]
  from = "/api/session/me"
  to = "/.netlify/functions/session-me"
  status = 200

[[redirects]]
  from = "/api/session/heartbeat"
  to = "/.netlify/functions/session-heartbeat"
  status = 200

[[redirects]]
  from = "/api/session/logout"
  to = "/.netlify/functions/session-logout"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
